<!DOCTYPE html>
<html lang="hu" id="pagetop">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Naprendszer - Égitestek</title>
    <style>
        html {
            background-color: black;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
        }

        main {
            max-width: 900px;
            margin-inline: auto;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid gold;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #333;
            color: gold;
        }

        tr:nth-child(even) {
            background-color: #222;
        }

        #darab {
            margin-top: 12px;
            font-size: 14px;
            color: #ddd;
        }

        .buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .buttons button {
            background-color: #444;
            color: gold;
            border: 1px solid gold;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .buttons button:hover {
            background-color: #555;
            box-shadow: 0 0 10px gold;
        }

        .buttons button.active {
            background-color: gold;
            color: black;
            font-weight: bold;
        }

        .buttons select {
            background-color: #444;
            color: gold;
            border: 1px solid gold;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .buttons select:hover {
            background-color: #555;
            box-shadow: 0 0 10px gold;
        }

        .buttons select:focus {
            outline: 2px solid gold;
        }

        footer {
            background-color: #eee;
            color: black;
            padding: 20px;
            border: 1px black solid;
            box-shadow: -2px -2px 5px gold;
            text-align: center;
        }

        footer a {
            color: black;
            text-decoration: none;
        }

        @media (max-width: 640px) {
            nav li {
                display: block;
                padding: 8px 0;
            }

            main {
                padding: 12px;
            }

            th, td {
                padding: 8px;
                font-size: 14px;
            }

            th:nth-child(2), td:nth-child(2),
            th:nth-child(3), td:nth-child(3),
            th:nth-child(4), td:nth-child(4) {
                display: none;
            }
        }
    </style>
</head>

<body>

    <main class="page">
        <h1>Naprendszer - Égitestek</h1>
        
        <div class="buttons">
            <button data-param="?egitest=mind">Minden égites</button>
            <button data-param="?felfedezo=voyager">Voyager felfedezte</button>
            <select id="evValaszto">
                <option value="">Válassz felfedezési évet</option>
                <option value="1610">1610</option>
                <option value="1655">1655</option>
                <option value="1671">1671</option>
                <option value="1672">1672</option>
                <option value="1684">1684</option>
                <option value="1787">1787</option>
                <option value="1789">1789</option>
                <option value="1846">1846</option>
                <option value="1848">1848</option>
                <option value="1851">1851</option>
                <option value="1877">1877</option>
                <option value="1892">1892</option>
                <option value="1948">1948</option>
                <option value="1979">1979</option>
                <option value="1980">1980</option>
            </select>
        </div>

        <table id="tabla">
            <thead>
                <tr>
                    <th>Név</th>
                    <th>Hol kering</th>
                    <th>Távolság (ezer km)</th>
                    <th>Átmérő (km)</th>
                    <th>Felfedező</th>
                    <th>Felfedezés éve</th>
                </tr>
            </thead>
            <tbody id="adatok"></tbody>
        </table>
        <p id="darab"></p>
    </main>

    <script>
        const apiUrl = 'https://info.nytta.hu/web/api/naprendszer/';
        let currentParam = '?egitest=mind';

        function loadData(param) {
            currentParam = param;
            const url = apiUrl + param;
            
            const tbody = document.getElementById('adatok');
            tbody.innerHTML = '';
            
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    const darab = document.getElementById('darab');
                    data.forEach(item => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${item.nev}</td>
                            <td>${item.holkering}</td>
                            <td>${item.tavolsag}</td>
                            <td>${item.atmero}</td>
                            <td>${item.felfedezo}</td>
                            <td>${item.felfedezeseve}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                    darab.textContent = `Összesen ${data.length} elem van.`;
                    
                    document.querySelectorAll('.buttons button').forEach(btn => {
                        btn.classList.remove('active');
                        if (btn.dataset.param === param) {
                            btn.classList.add('active');
                        }
                    });
                })
                .catch(error => {
                    document.getElementById('darab').textContent = 'Hiba az adatok betöltése közben!';
                    console.error('Hiba:', error);
                });
        }

        document.querySelectorAll('.buttons button').forEach(btn => {
            btn.addEventListener('click', function() {
                loadData(this.dataset.param);
                document.getElementById('evValaszto').value = '';
            });
        });

        document.getElementById('evValaszto').addEventListener('change', function() {
            if (this.value) {
                loadData('?felfedezes=' + this.value);
                document.querySelectorAll('.buttons button').forEach(btn => {
                    btn.classList.remove('active');
                });
            }
        });

        loadData(currentParam);
    </script>

</body>
</html>
